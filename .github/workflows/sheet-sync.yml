name: Sync MyTracc -> Google Sheets

on:
  schedule:
    # 23:30 UTC todas las noches (~00:30/01:30 hora de España segun horario de verano).
    - cron: '30 23 * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/sheet-sync
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - run: node src/index.js
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          CLIENT_ID: ${{ vars.CLIENT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          SPREADSHEET_ID_WEEKLY: ${{ vars.SPREADSHEET_ID_WEEKLY }}
          SPREADSHEET_ID_PLAN: ${{ vars.SPREADSHEET_ID_PLAN }}
          ACTIVE_MESOCICLO_TAB: ${{ vars.ACTIVE_MESOCICLO_TAB }}
          DEBUG_SYNC: 'true'
